    min-height: 0;
    overflow: hidden;
  }

  .movie-meta {
    font-size: 14px; color: #666; line-height: 1.6; margin-bottom: 10px;
  }

  .movie-quote {
    font-size: 16px;
    font-style: italic; line-height: 1.7;

    padding: 10px 14px;

    background: #f8f8f8;

    display: flex; align-items: center;

    overflow: hidden;

var MAP = {};
for (var i = 0; i < ENTRIES.length; i++) {
  var e = ENTRIES[i];
  MAP[pad(e.m,2)+pad(e.d,2)] = e;
}
function pad(n,w) { var s=String(n); while(s.length<w) s='0'+s; return s; }
var WEEKDAY = ['周日','周一','周二','周三','周四','周五','周六'];

var curYear = 2026;
var curMonth = 1;
var curDay = 1;
// 用北京时间确定今天
var today = getBeijingNow();
if (today.getUTCFullYear() === 2026) {
  curMonth = today.getUTCMonth() + 1;
  curDay = today.getUTCDate();
}

function render(m, d) {
  var key = pad(m,2)+pad(d,2);
  var entry = MAP[key];
  var dt = new Date(curYear, m-1, d);
  document.getElementById('dateDisplay').textContent = pad(m,2)+'/'+pad(d,2);
  document.getElementById('weekdayDisplay').textContent = WEEKDAY[dt.getDay()];

  if (!entry) {
    document.getElementById('lunarDisplay').textContent = '';
    document.getElementById('movieTitle').innerHTML = '无数据';
    document.getElementById('movieMeta').textContent = '';
    document.getElementById('movieQuote').innerHTML = '';
    document.getElementById('navLabel').textContent = m+'月'+d+'日';
    document.getElementById('gotoInput').value = key;
    return;
  }

  document.getElementById('lunarDisplay').textContent = entry.lunar || '';

  var titleHtml = entry.t;
  if (entry.url) titleHtml = '<a href="'+entry.url+'">'+entry.t+'</a>';
  if (entry.r) {
    var stars = '';
    if (entry.s) { for (var si=0; si<Math.floor(entry.s); si++) stars+='★'; if(entry.s-Math.floor(entry.s)>=0.5) stars+='☆'; }
    titleHtml += ' <span class="rating">'+entry.r+' '+stars+'</span>';
  }
  document.getElementById('movieTitle').innerHTML = titleHtml;

  var parts = [];
  if (entry.dir) parts.push('导演: '+entry.dir);
  if (entry.year) parts.push(entry.year);
  if (entry.gen) parts.push(entry.gen);
  document.getElementById('movieMeta').textContent = parts.join(' · ') || '';
  document.getElementById('movieQuote').innerHTML = '&ldquo;'+(entry.q||'')+'&rdquo;';

  document.getElementById('navLabel').textContent = m+'月'+d+'日';
  document.getElementById('gotoInput').value = key;

  var keys = Object.keys(MAP).sort();
  var idx = keys.indexOf(key);
  document.getElementById('prevBtn').className = 'nav-btn'+(idx>0?'':' disabled');
  document.getElementById('nextBtn').className = 'nav-btn'+(idx<keys.length-1?'':' disabled');
}

// 时钟 — 每秒更新，显示秒数
function getBeijingNow() {
  var now = new Date();
  // UTC + 8 = 北京时间
  var bj = new Date(now.getTime() + 8 * 60 * 60 * 1000);
  return bj;
}

function updateClock() {
  var now = getBeijingNow();
  var h = pad(now.getUTCHours(),2);
  var m = pad(now.getUTCMinutes(),2);
  var s = pad(now.getUTCSeconds(),2);
  document.getElementById('clockDisplay').innerHTML = h+'<span class="colon">:</span>'+m+'<span class="sec">'+s+'</span>';
}
updateClock();
setInterval(updateClock, 1000);

document.getElementById('prevBtn').onclick = function() {
  var keys = Object.keys(MAP).sort();
  var cur = pad(curMonth,2)+pad(curDay,2);
  var idx = keys.indexOf(cur);
  if (idx > 0) { curMonth=parseInt(keys[idx-1].substring(0,2),10); curDay=parseInt(keys[idx-1].substring(2,4),10); render(curMonth,curDay); }
};
document.getElementById('nextBtn').onclick = function() {
  var keys = Object.keys(MAP).sort();
  var cur = pad(curMonth,2)+pad(curDay,2);
  var idx = keys.indexOf(cur);
  if (idx >=0 && idx < keys.length-1) { curMonth=parseInt(keys[idx+1].substring(0,2),10); curDay=parseInt(keys[idx+1].substring(2,4),10); render(curMonth,curDay); }
};
document.getElementById('gotoBtn').onclick = function() {
  var v = document.getElementById('gotoInput').value.trim();
  if (v.length===4 && MAP[v]) { curMonth=parseInt(v.substring(0,2),10); curDay=parseInt(v.substring(2,4),10); render(curMonth,curDay); }
};
document.getElementById('gotoInput').onkeypress = function(e) { if(e.key==='Enter') document.getElementById('gotoBtn').click(); };

// 全屏 — Kindle 兼容多策略
function toggleFullscreen() {
  var el = document.documentElement;
  // 退出全屏
  if (document.fullscreenElement || document.webkitFullscreenElement || document.webkitIsFullScreen) {
    if (document.exitFullscreen) document.exitFullscreen();
    else if (document.webkitExitFullscreen) document.webkitExitFullscreen();
    else if (document.webkitCancelFullScreen) document.webkitCancelFullScreen();
    document.getElementById('fsBtn').textContent = '⬜';
    return;
  }
  // 进入全屏 — 尝试所有方式
  if (el.requestFullscreen) { el.requestFullscreen(); }
  else if (el.webkitRequestFullscreen) { el.webkitRequestFullscreen(); }
  else if (el.webkitRequestFullScreen) { el.webkitRequestFullScreen(Element.ALLOW_KEYBOARD_INPUT); }
  // Kindle 备选：隐藏地址栏
  window.scrollTo(0, 1);
  setTimeout(function() { window.scrollTo(0, 1); }, 100);
  document.getElementById('fsBtn').textContent = '⛶';
}
document.getElementById('fsBtn').onclick = toggleFullscreen;

// 进入页面时尝试隐藏地址栏
setTimeout(function() {
  window.scrollTo(0, 1);
  // 尝试 Kindle 浏览器全屏
  var el = document.documentElement;
  if (el.webkitRequestFullScreen) { el.webkitRequestFullScreen(Element.ALLOW_KEYBOARD_INPUT); }
  else if (el.webkitRequestFullscreen) { el.webkitRequestFullscreen(); }
}, 1000);

render(curMonth, curDay);
</script>
